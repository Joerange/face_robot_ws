  - id: 9 # 角度增大，右眼上眼睑向上运动，眼睛张开
    joint: right_eyelid_upper
    neutral: 75.0
    min: 0.0
    max: 75.0
    direction: 1

  - id: 10 # 角度增大，右眼下眼睑向下运动，眼睛张开
    joint: right_eyelid_lower
    neutral: 45.0
    min: 0.0
    max: 45.0
    direction: 1

  - id: 11 # 角度增大，左眼上眼睑向下运动，眼睛关闭
    joint: left_eyelid_upper
    neutral: 110.0
    min: 110.0
    max: 180.0
    direction: -1

  - id: 12 # 角度增大，左眼下眼睑向上运动，眼睛关闭
    joint: left_eyelid_lower
    neutral: 135.0
    min: 135.0

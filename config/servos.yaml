# 舵机参数配置
# min/max: 物理限位角度(°)  neutral: 中位角度(已标定)  direction: 已校验
#
# direction 语义约定（正方向 = +1）:
#   眉毛/鼻/颊       → 向上
#   眼睑             → 张开
#   眼球 pitch/yaw   → 向上看 / 向左看（机器人视角）
#   上唇             → 向上
#   嘴角 ud          → 上扬（微笑方向）
#   嘴角 fb          → 向前
#   下唇             → 向下
#
# 用法: raw_angle = neutral + direction × semantic_delta

servos:
  - id: 1 # 角度增大，向上运动
    joint: right_nose
    neutral: 90.0
    min: 80.0
    max: 160.0
    direction: 1

  - id: 2 # 角度增大，向上运动
    joint: right_cheek
    neutral: 90.0
    min: 30.0
    max: 125.0
    direction: 1

  - id: 3 # 角度增大，向上运动
    joint: right_eyebow_right
    neutral: 90.0
    min: 80.0
    max: 145.0
    direction: 1

  - id: 4 # 角度增大，向下运动
    joint: right_eyebow_left
    neutral: 90.0
    min: 70.0
    max: 105.0
    direction: -1

  - id: 5 # 角度增大，向下运动
    joint: left_nose
    neutral: 90.0
    min: 20.0
    max: 110.0
    direction: -1

  - id: 6 # 角度增大，向下运动
    joint: left_cheek
    neutral: 90.0
    min: 45.0
    max: 140.0
    direction: -1

  - id: 7 # 角度增大，向下运动
    joint: left_eyebow_left
    neutral: 90.0
    min: 35.0
    max: 100.0
    direction: -1

  - id: 8 # 角度增大，向上运动
    joint: left_eyebow_right
    neutral: 90.0
    min: 74.0
    max: 113.0
    direction: 1

